<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 Library API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.3rem;
      color: #f8fafc;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid #334155;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .get    { border-left: 4px solid #22c55e; }
    .post   { border-left: 4px solid #3b82f6; }
    .put    { border-left: 4px solid #f59e0b; }
    .delete { border-left: 4px solid #ef4444; }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .badge-get    { background: #166534; color: #bbf7d0; }
    .badge-post   { background: #1e3a8a; color: #bfdbfe; }
    .badge-put    { background: #78350f; color: #fde68a; }
    .badge-delete { background: #7f1d1d; color: #fecaca; }

    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
      margin-top: 0.8rem;
    }

    input, select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #64748b; }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-get    { background: #22c55e; color: #000; }
    .btn-post   { background: #3b82f6; color: #fff; }
    .btn-put    { background: #f59e0b; color: #000; }
    .btn-delete { background: #ef4444; color: #fff; }

    .response-box {
      grid-column: 1 / -1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .response-box h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #94a3b8;
    }

    #response {
      background: #0f172a;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      min-height: 80px;
      max-height: 300px;
      overflow-y: auto;
      color: #a3e635;
      border: 1px solid #1e293b;
    }

    #books-table {
      grid-column: 1 / -1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
    }
    #books-table h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #94a3b8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 0.8rem;
      background: #0f172a;
      color: #64748b;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 0.7rem 0.8rem;
      border-top: 1px solid #1e293b;
      color: #cbd5e1;
    }
    tr:hover td { background: #0f172a; }

    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .available    { background: #166534; color: #bbf7d0; }
    .unavailable  { background: #7f1d1d; color: #fecaca; }

    .search-bar {
      grid-column: 1 / -1;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .search-bar input { flex: 1; }
    .search-bar button { width: auto; padding: 0.55rem 1.5rem; margin: 0; }
  </style>
</head>
<body>

<h1>📚 Library API</h1>
<p class="subtitle">PHP + MySQL REST API — CRUD Demo</p>

<div class="grid">

  <!-- Search bar -->
  <div class="search-bar">
    <div style="flex:1">
      <label>Search title or author</label>
      <input type="text" id="search-input" placeholder="e.g. Orwell" />
    </div>
    <button class="btn-get" onclick="searchBooks()">🔍 Search</button>
    <button class="btn-get" style="background:#475569;color:#fff" onclick="loadAllBooks()">Show All</button>
  </div>

  <!-- GET single book -->
  <div class="card get">
    <h2><span class="badge badge-get">GET</span> Fetch Book by ID</h2>
    <label>Book ID</label>
    <input type="number" id="get-id" placeholder="e.g. 1" min="1"/>
    <button class="btn-get" onclick="getBook()">Fetch Book</button>
  </div>

  <!-- POST add book -->
  <div class="card post">
    <h2><span class="badge badge-post">POST</span> Add New Book</h2>
    <label>Title *</label>
    <input type="text" id="post-title" placeholder="Book title"/>
    <label>Author *</label>
    <input type="text" id="post-author" placeholder="Author name"/>
    <label>Genre</label>
    <input type="text" id="post-genre" placeholder="e.g. Fiction"/>
    <label>Year</label>
    <input type="number" id="post-year" placeholder="e.g. 2024" min="1000" max="2099"/>
    <label>Available</label>
    <select id="post-available">
      <option value="1">✅ Yes</option>
      <option value="0">❌ No</option>
    </select>
    <button class="btn-post" onclick="addBook()">Add Book</button>
  </div>

  <!-- PUT update book -->
  <div class="card put">
    <h2><span class="badge badge-put">PUT</span> Update Book</h2>
    <label>Book ID *</label>
    <input type="number" id="put-id" placeholder="ID to update" min="1"/>
    <label>New Title</label>
    <input type="text" id="put-title" placeholder="Leave blank to keep current"/>
    <label>New Author</label>
    <input type="text" id="put-author" placeholder="Leave blank to keep current"/>
    <label>New Genre</label>
    <input type="text" id="put-genre" placeholder="Leave blank to keep current"/>
    <label>Available</label>
    <select id="put-available">
      <option value="">— No change —</option>
      <option value="1">✅ Yes</option>
      <option value="0">❌ No</option>
    </select>
    <button class="btn-put" onclick="updateBook()">Update Book</button>
  </div>

  <!-- DELETE book -->
  <div class="card delete">
    <h2><span class="badge badge-delete">DELETE</span> Remove Book</h2>
    <label>Book ID</label>
    <input type="number" id="delete-id" placeholder="ID to delete" min="1"/>
    <button class="btn-delete" onclick="deleteBook()">Delete Book</button>
  </div>

  <!-- Response viewer -->
  <div class="response-box">
    <h2>📡 API Response</h2>
    <pre id="response">// Response will appear here...</pre>
  </div>

  <!-- Books table -->
  <div id="books-table">
    <h2>📖 All Books <span id="book-count" style="color:#64748b;font-weight:400"></span></h2>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Title</th><th>Author</th>
          <th>Genre</th><th>Year</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="books-body">
        <tr><td colspan="6" style="text-align:center;color:#475569">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const API = 'api.php';

  function showResponse(data) {
    document.getElementById('response').textContent = JSON.stringify(data, null, 2);
  }

  function renderTable(books) {
    const tbody = document.getElementById('books-body');
    document.getElementById('book-count').textContent = `(${books.length})`;
    if (!books.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#475569">No books found</td></tr>';
      return;
    }
    tbody.innerHTML = books.map(b => `
      <tr>
        <td>${b.id}</td>
        <td>${b.title}</td>
        <td>${b.author}</td>
        <td>${b.genre}</td>
        <td>${b.year ?? '—'}</td>
        <td><span class="pill ${b.available == 1 ? 'available' : 'unavailable'}">
          ${b.available == 1 ? 'Available' : 'Checked Out'}
        </span></td>
      </tr>`).join('');
  }

  async function loadAllBooks() {
    const res  = await fetch(API);
    const data = await res.json();
    showResponse(data);
    if (data.data) renderTable(data.data);
  }

  async function searchBooks() {
    const q   = document.getElementById('search-input').value.trim();
    const url = q ? `${API}?search=${encodeURIComponent(q)}` : API;
    const res  = await fetch(url);
    const data = await res.json();
    showResponse(data);
    if (data.data) renderTable(data.data);
  }

  async function getBook() {
    const id = document.getElementById('get-id').value;
    if (!id) return alert('Enter a book ID');
    const res  = await fetch(`${API}?id=${id}`);
    const data = await res.json();
    showResponse(data);
  }

  async function addBook() {
    const body = {
      title:     document.getElementById('post-title').value.trim(),
      author:    document.getElementById('post-author').value.trim(),
      genre:     document.getElementById('post-genre').value.trim(),
      year:      document.getElementById('post-year').value,
      available: document.getElementById('post-available').value
    };
    if (!body.title || !body.author) return alert('Title and author are required');

    const res  = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    showResponse(data);
    if (data.success) {
      loadAllBooks();
      ['post-title','post-author','post-genre','post-year'].forEach(id => document.getElementById(id).value = '');
    }
  }

  async function updateBook() {
    const id = document.getElementById('put-id').value;
    if (!id) return alert('Enter a book ID to update');

    const body = {};
    const title  = document.getElementById('put-title').value.trim();
    const author = document.getElementById('put-author').value.trim();
    const genre  = document.getElementById('put-genre').value.trim();
    const avail  = document.getElementById('put-available').value;

    if (title)      body.title     = title;
    if (author)     body.author    = author;
    if (genre)      body.genre     = genre;
    if (avail !== '') body.available = avail;

    if (!Object.keys(body).length) return alert('Fill in at least one field to update');

    const res  = await fetch(`${API}?id=${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    showResponse(data);
    if (data.success) loadAllBooks();
  }

  async function deleteBook() {
    const id = document.getElementById('delete-id').value;
    if (!id) return alert('Enter a book ID to delete');
    if (!confirm(`Delete book ID ${id}?`)) return;

    const res  = await fetch(`${API}?id=${id}`, { method: 'DELETE' });
    const data = await res.json();
    showResponse(data);
    if (data.success) loadAllBooks();
  }

  // Load books on page load
  loadAllBooks();
</script>
</body>
</html>
